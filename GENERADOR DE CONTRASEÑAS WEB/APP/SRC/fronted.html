<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Contraseñas Elegante</title>
    <link rel="stylesheet" href="diseño.css">
</head>
<body>
    <div class="container">
        <h1>Generador de Contraseñas Seguras</h1>
        <div class="form-group">
            <label for="length">Longitud de la contraseña:</label>
            <input type="number" id="length" value="12" min="8" max="50">
        </div>
        <div class="form-group">
            <label><input type="checkbox" id="uppercase" checked> Incluir mayúsculas</label>
        </div>
        <div class="form-group">
            <label><input type="checkbox" id="numbers" checked> Incluir números</label>
        </div>
        <div class="form-group">
            <label><input type="checkbox" id="symbols" checked> Incluir símbolos</label>
        </div>
        <button id="generateBtn">Generar Contraseña</button>
        <div class="result">
            <p id="passwordDisplay"></p>
            <button id="copyBtn" style="display:none;">Copiar</button>
        </div>
    </div>
    <script src="logica.js"></script>
</body>
</html>
